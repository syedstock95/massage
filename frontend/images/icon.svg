<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Spa/Lotus icon -->
  <g transform="translate(256, 280)">
    <!-- Center petal -->
    <ellipse cx="0" cy="-80" rx="40" ry="100" fill="#ffffff" opacity="0.95"/>
    <!-- Left petals -->
    <ellipse cx="-70" cy="-50" rx="35" ry="90" fill="#ffffff" opacity="0.85" transform="rotate(-30)"/>
    <ellipse cx="-110" cy="-20" rx="30" ry="75" fill="#ffffff" opacity="0.75" transform="rotate(-55)"/>
    <!-- Right petals -->
    <ellipse cx="70" cy="-50" rx="35" ry="90" fill="#ffffff" opacity="0.85" transform="rotate(30)"/>
    <ellipse cx="110" cy="-20" rx="30" ry="75" fill="#ffffff" opacity="0.75" transform="rotate(55)"/>
    <!-- Base/stem hint -->
    <ellipse cx="0" cy="20" rx="60" ry="25" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- Text: M -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">M</text>
</svg>
